<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Hiring Assistant</title>
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- App Container -->
    <div id="app">
      <!-- Background Decorations (Gradients) -->
      <div class="bg-glow bg-glow-1"></div>
      <div class="bg-glow bg-glow-2"></div>

      <!-- Main Layout -->
      <div class="layout">
        <!-- Sidebar Navigation / Configuration -->
        <aside class="sidebar glass-panel">
          <div class="sidebar-header">
            <h1 class="logo">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-bot"
              >
                <path d="M12 8V4H8" />
                <rect width="16" height="12" x="4" y="8" rx="2" />
                <path d="M2 14h2" />
                <path d="M20 14h2" />
                <path d="M15 13v2" />
                <path d="M9 13v2" />
              </svg>
              AI Screener
            </h1>
          </div>

          <div class="sidebar-content">
            <div class="form-group" style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); padding: 1rem; border-radius: var(--radius-sm);">
              <label style="color: var(--success); margin-bottom: 0; font-weight: 600;">✅ API Key Secure</label>
              <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem;">Loaded securely from backend configuration.</p>
            </div>
          </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
          <header class="header">
            <h2>🚀 Autonomous Hiring Assistant</h2>
            <p class="subtitle">
              Evaluate candidates against job descriptions with AI precision.
            </p>
          </header>

          <!-- Input Section -->
          <section class="card glass-panel section-inputs">
            <div class="split-layout">
              <!-- Left: Job Description -->
              <div class="form-column">
                <label for="jobDescription" class="section-label"
                  >📌 Job Description</label
                >
                <textarea
                  id="jobDescription"
                  class="input-field textarea"
                  placeholder="Paste the job requirements, skills, and experience here..."
                ></textarea>
              </div>

              <!-- Right: File Upload -->
              <div class="form-column">
                <label class="section-label">📂 Upload Resumes</label>
                <div class="upload-zone" id="uploadZone">
                  <div class="upload-icon">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="32"
                      height="32"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="lucide lucide-upload-cloud"
                    >
                      <path
                        d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"
                      />
                      <path d="M12 12v9" />
                      <path d="m16 16-4-4-4 4" />
                    </svg>
                  </div>
                  <p class="upload-text">Click to browse or drag & drop PDFs</p>
                  <p class="upload-hint">Upload multiple candidate resumes.</p>
                  <input
                    type="file"
                    id="fileInput"
                    multiple
                    accept=".pdf"
                    class="hidden-input"
                  />
                </div>

                <!-- File List Preview -->
                <div id="fileList" class="file-list"></div>
              </div>
            </div>

            <div class="actions">
              <button id="analyzeBtn" class="btn btn-primary" disabled>
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-search"
                >
                  <circle cx="11" cy="11" r="8" />
                  <path d="m21 21-4.3-4.3" />
                </svg>
                Analyze Candidates
              </button>
            </div>

            <!-- Loading Indicator -->
            <div id="loadingIndicator" class="loading-indicator hidden">
              <div class="spinner"></div>
              <p>Analyzing resumes against job description...</p>
              <div class="progress-bar-container">
                <div
                  id="progressBar"
                  class="progress-bar"
                  style="width: 0%"
                ></div>
              </div>
            </div>
          </section>

          <!-- Results Section (hidden initially) -->
          <section id="resultsSection" class="results-section hidden">
            <div class="results-header">
              <h3>📊 Candidate Rankings</h3>
              <button id="downloadBtn" class="btn btn-secondary btn-sm">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-download"
                >
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" x2="12" y1="15" y2="3" />
                </svg>
                Export CSV
              </button>
            </div>

            <div
              id="topCandidateAlert"
              class="alert alert-success mt-4 hidden"
            ></div>

            <div id="candidatesList" class="candidates-list mt-4">
              <!-- Result cards injected here by JS -->
            </div>
          </section>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
